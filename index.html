<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Pethgam Wagoora | Result System Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        #pdf-render-zone { position: absolute; left: -9999px; top: 0; width: 210mm; }
        .table-xs th, .table-xs td { font-size: 0.75rem; padding: 0.5rem; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">GPS PETHGAM WAGOORA</h1>
            <div class="flex items-center gap-4">
                <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden">
                <label for="excelInput" class="bg-emerald-500 hover:bg-emerald-400 text-white px-5 py-2 rounded-full font-bold cursor-pointer transition shadow-lg">
                    📥 Upload Report Sheet
                </label>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between mb-6 gap-4 items-center">
            <input type="text" id="searchInput" placeholder="Search by Student Name or Apaar ID..." class="border-2 border-blue-200 p-3 rounded-xl w-full md:w-1/2 shadow-sm focus:ring-4 focus:ring-blue-100 outline-none transition-all">
            <div class="bg-white px-6 py-3 rounded-xl shadow-sm border border-blue-100">
                <p class="text-sm text-slate-500">Students Processed: <span id="studentCount" class="font-bold text-blue-600 text-lg">0</span></p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse table-xs">
                    <thead class="bg-slate-50 border-b-2 border-slate-100">
                        <tr class="text-slate-600 uppercase">
                            <th class="p-4">Roll</th>
                            <th class="p-4">Student Name</th>
                            <th class="p-4">Apaar ID</th>
                            <th class="p-4">PEN Number</th>
                            <th class="p-4">DOB</th>
                            <th class="p-4">Total</th>
                            <th class="p-4">%</th>
                            <th class="p-4">Grade</th>
                            <th class="p-4">Remarks</th>
                            <th class="p-4 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody" class="divide-y divide-slate-100">
                        <tr><td colspan="10" class="p-20 text-center text-slate-400 italic">Waiting for Excel data upload...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="pdf-render-zone">
        <div id="marksheet-template" class="bg-white p-12 border-[12px] border-double border-blue-900">
            <div class="text-center border-b-4 border-red-600 pb-4 mb-8">
                <h2 class="text-4xl font-black text-blue-900">GOVT. PRIMARY SCHOOL PETHGAM WAGOORA</h2>
                <p class="text-2xl font-bold text-red-600 uppercase mt-2 tracking-widest">Annual Progress Report</p>
            </div>

            <div id="info-grid" class="grid grid-cols-2 gap-x-12 gap-y-3 mb-10 text-lg border-b pb-8"></div>

            <table class="w-full border-2 border-black mb-10 text-center text-lg">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="border-2 border-black p-3">Subject</th>
                        <th class="border-2 border-black p-3">Max Marks</th>
                        <th class="border-2 border-black p-3">Marks Obtained</th>
                    </tr>
                </thead>
                <tbody id="marks-table-body"></tbody>
            </table>

            <div class="grid grid-cols-2 gap-10 mt-20 font-bold text-center">
                <div>
                    <div class="border-t-2 border-black pt-2 mx-auto w-48 text-xl">Class Teacher</div>
                </div>
                <div>
                    <div class="border-t-2 border-black pt-2 mx-auto w-48 text-xl">Headmaster</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let studentData = [];

        // Helper to find column keys because Excel headers have extra spaces/newlines
        function findKey(row, pattern) {
            const keys = Object.keys(row);
            return keys.find(k => k.toLowerCase().replace(/[^a-z0-9]/g, '').includes(pattern.toLowerCase().replace(/[^a-z0-9]/g, '')));
        }

        document.getElementById('excelInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                // We read the first sheet
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                
                // Important: Sheets with multi-row headers often need to be cleaned
                // We skip common header junk if the first few rows are empty
                studentData = processStudents(json);
                renderTable(studentData);
            };
            reader.readAsBinaryString(file);
        });

        function processStudents(data) {
            // Filter out rows that don't have a name or roll number
            return data.filter(row => findKey(row, 'Name')).map(row => {
                // Mapping based on your provided images
                const s = {
                    rollNo: row[findKey(row, 'RollNo')] || row['__EMPTY_1'] || "N/A",
                    name: row[findKey(row, 'Name')] || "N/A",
                    father: row[findKey(row, 'Father')] || "N/A",
                    mother: row[findKey(row, 'Mother')] || "N/A",
                    contact: row[findKey(row, 'Contact')] || "N/A",
                    dob: row[findKey(row, 'DOB')] || "N/A",
                    apaarId: row[findKey(row, 'Apaar')] || "N/A",
                    pen: row[findKey(row, 'PEN')] || "N/A",
                    remarks: row[findKey(row, 'Remarks')] || "Promoted",
                    total: row[findKey(row, 'GrandTotal')] || 0,
                    percentage: row[findKey(row, 'Percentage')] || 0,
                    grade: row[findKey(row, 'Grade')] || "N/A"
                };

                // Subject Mapping - specifically looking for the "Total" columns per subject
                const subjects = ['English', 'Mathematics', 'Environment Science', 'Urdu', 'Kashmiri'];
                s.marks = subjects.map(sub => {
                    // In complex sheets, XLSX often names duplicate "Total" columns as Total_1, Total_2
                    // We attempt to find values or set default
                    return { name: sub, score: row[findKey(row, sub)] || "---" };
                });

                return s;
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('studentTableBody');
            document.getElementById('studentCount').innerText = data.length;
            
            tbody.innerHTML = data.map((s, idx) => `
                <tr class="hover:bg-blue-50 transition border-b border-slate-100">
                    <td class="p-4 font-mono font-bold text-slate-500">${s.rollNo}</td>
                    <td class="p-4 font-bold text-blue-900">${s.name}</td>
                    <td class="p-4 text-xs">${s.apaarId}</td>
                    <td class="p-4 text-xs">${s.pen}</td>
                    <td class="p-4">${s.dob}</td>
                    <td class="p-4 font-bold">${s.total}</td>
                    <td class="p-4">${s.percentage}%</td>
                    <td class="p-4"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-black">${s.grade}</span></td>
                    <td class="p-4 text-emerald-600 font-medium">${s.remarks}</td>
                    <td class="p-4 text-center">
                        <button onclick="downloadPDF(${idx})" class="bg-blue-600 hover:bg-blue-800 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md transition-all active:scale-95">GENERATE PDF</button>
                    </td>
                </tr>
            `).join('');
        }

        async function downloadPDF(idx) {
            const s = studentData[idx];
            document.getElementById('info-grid').innerHTML = `
                <div>
                    <p><strong>Student Name:</strong> ${s.name}</p>
                    <p><strong>Father's Name:</strong> ${s.father}</p>
                    <p><strong>Mother's Name:</strong> ${s.mother}</p>
                    <p><strong>Date of Birth:</strong> ${s.dob}</p>
                </div>
                <div>
                    <p><strong>Apaar ID:</strong> ${s.apaarId}</p>
                    <p><strong>PEN Number:</strong> ${s.pen}</p>
                    <p><strong>Roll No:</strong> ${s.rollNo}</p>
                    <p><strong>Contact:</strong> ${s.contact}</p>
                </div>
            `;
            
            document.getElementById('marks-table-body').innerHTML = s.marks.map(m => `
                <tr>
                    <td class="border-2 border-black p-3 text-left font-bold pl-8">${m.name}</td>
                    <td class="border-2 border-black p-3">100</td>
                    <td class="border-2 border-black p-3 font-bold">${m.score}</td>
                </tr>
            `).join('') + `
                <tr class="bg-slate-50 font-black">
                    <td class="border-2 border-black p-4 text-right">GRAND TOTAL</td>
                    <td class="border-2 border-black p-4">500</td>
                    <td class="border-2 border-black p-4 text-blue-800 text-xl">${s.total}</td>
                </tr>
                <tr class="font-black">
                    <td colspan="2" class="border-2 border-black p-4 text-right uppercase">Result / Remarks</td>
                    <td class="border-2 border-black p-4 text-emerald-700 text-xl">${s.remarks}</td>
                </tr>
            `;

            const element = document.getElementById('marksheet-template');
            const opt = { 
                margin: 0, 
                filename: `Report_${s.name}.pdf`, 
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };
            
            html2pdf().set(opt).from(element).save();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = studentData.filter(s => 
                s.name.toLowerCase().includes(val) || 
                s.apaarId.toString().includes(val)
            );
            renderTable(filtered);
        });
    </script>
</body>
</html>
