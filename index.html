<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Pethgam Wagoora - Result Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="school-header">
                <img src="https://via.placeholder.com/100x100/4A90E2/FFFFFF?text=GPS" alt="School Logo" class="school-logo">
                <div class="school-info">
                    <h1>Government Primary School Pethgam Wagoora</h1>
                    <p>Wagoora, Sopore, Jammu & Kashmir</p>
                </div>
            </div>
        </header>

        <div class="upload-section">
            <div class="upload-card">
                <h2>📁 Upload Excel Results</h2>
                <input type="file" id="excelFile" accept=".xlsx,.xls" class="file-input">
                <button onclick="processExcel()" class="btn-primary">Process File</button>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search by name, roll, class..." onkeyup="filterTable()">
            <select id="classFilter" onchange="filterTable()">
                <option value="">All Classes</option>
            </select>
            <button onclick="downloadPDF()" class="btn-secondary" style="margin-left: 10px; padding: 10px 20px; cursor: pointer;">📄 Download PDF</button>
        </div>

        <div class="table-container">
            <table id="resultsTable" class="results-table">
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Student Name</th>
                        <th>Father's Name</th>
                        <th>Roll No</th>
                        <th>Class</th>
                        <th>Total (%)</th>
                        <th>Grade</th>
                        <th>Rank</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="photoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('photoModal').style.display='none'">&times;</span>
            <h3>Upload Student Photo</h3>
            <input type="file" id="photoFile" accept="image/*">
            <button onclick="uploadPhoto()" class="btn-primary">Upload</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
